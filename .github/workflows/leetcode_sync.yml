name: LeetCode Stats Sync

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次
  workflow_dispatch: # 允许手动点击运行
  push:
    branches:
      - main # 每次推送到 main 分支也运行一次

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run LeetCode Sync Script
        run: node scripts/update_leetcode.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add static/images/leetcode-stats.svg
          git commit -m "chore: update leetcode statistics [skip ci]" || echo "No changes to commit"
          git push
